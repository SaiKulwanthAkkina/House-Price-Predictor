<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Price Predictor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}


body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#0f172a;

}



.container{

    width:1000px;

    height:600px;

    display:flex;

    background:white;

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 25px 60px rgba(0,0,0,0.4);

}



.image-section{

    width:50%;

    position:relative;

}


.image-section img{

    width:100%;

    height:100%;

    object-fit:cover;

}


.overlay{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:linear-gradient(
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.6)
    );

}


.image-text{

    position:absolute;

    bottom:50px;

    left:40px;

    color:white;

}


.image-text h1{

    font-size:40px;

}


.image-text p{

    margin-top:10px;

    font-size:18px;

}





.form-section{

    width:50%;

    padding:60px 50px;

    display:flex;

    flex-direction:column;

    justify-content:center;

}



.logo{

    font-size:50px;

    text-align:center;

}


h2{

    text-align:center;

    color:#1e3a8a;

    margin-top:10px;

    font-size:32px;

}


.description{

    text-align:center;

    color:#64748b;

    margin:15px 0 35px;

}





input{

    width:100%;

    padding:16px;

    border-radius:12px;

    border:2px solid #e2e8f0;

    font-size:16px;

    outline:none;

}


input:focus{

    border-color:#2563eb;

}




button{

    margin-top:25px;

    width:100%;

    padding:16px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #38bdf8
    );

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}


button:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(37,99,235,.4);

}




.result{

    margin-top:30px;

    padding:18px;

    background:#eff6ff;

    border-radius:15px;

    border-left:5px solid #2563eb;

    text-align:center;

    font-size:20px;

    color:#1e40af;

    font-weight:bold;

}



.footer{

    text-align:center;

    margin-top:25px;

    color:#94a3b8;

    font-size:14px;

}




@media(max-width:900px){

.container{

    width:90%;

    height:auto;

    flex-direction:column;

}


.image-section,
.form-section{

    width:100%;

}


.image-section{

    height:300px;

}

}

</style>


</head>


<body>


<div class="container">


    <!-- Image -->

    <div class="image-section">

        <img src="{{ url_for('static', filename='house.jpeg') }}">

        <div class="overlay"></div>


        <div class="image-text">

            <h1>Dream Home</h1>

            <p>Smart AI powered price prediction</p>

        </div>

    </div>





    <div class="form-section">


        <div class="logo">
            🏠
        </div>


        <h2>
            House Price Predictor
        </h2>


        <p class="description">
            Enter house area to estimate the price using Machine Learning
        </p>



        <form action="{{ url_for('predict') }}" method="post">


            <input 
            type="number"
            name="area"
            placeholder="Enter Area (Sq.ft)"
            required>


            <button type="submit">
                Predict Price
            </button>


        </form>



        <div class="result">

            {{ prediction_text }}

        </div>



        <div class="footer">

            Machine Learning • Flask • AI

        </div>


    </div>


</div>


</body>

</html>
